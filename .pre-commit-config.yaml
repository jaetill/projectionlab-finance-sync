repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: lint-staged
        name: lint-staged
        entry: npx lint-staged
        language: system
        types: [text]
        pass_filenames: false

      - id: block-plan-json
        name: Refuse to commit data/plan.json
        entry: bash -c 'if git diff --cached --name-only | grep -E "^(data/plan\.json|api-key\.local)$" >/dev/null; then echo "BLOCKED: data/plan.json or api-key.local must never be committed (per spec §5 anti-list)"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
