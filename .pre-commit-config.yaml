repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: lint-staged
        name: lint-staged
        entry: npx lint-staged
        language: system
        types: [text]
        pass_filenames: false

      - id: block-sensitive-data
        name: Refuse to commit real PL data files
        entry: >-
          bash -c 'staged=$(git diff --cached --name-only);
          if echo "$staged" | grep -E "^(data/plan\.json|data/pl-export\.json|api-key\.local)$" >/dev/null;
          then echo "BLOCKED — data/plan.json, data/pl-export.json, and api-key.local must never be committed.";
          exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: deny-new-data-json
        name: Deny new JSON files in data/ (allowlist plan.example.json only)
        entry: >-
          bash -c 'staged=$(git diff --cached --name-only --diff-filter=A);
          bad=$(echo "$staged" | grep -E "^data/.*\.json$" | grep -vE "^data/plan\.example\.json$" || true);
          if [ -n "$bad" ];
          then echo "BLOCKED — new JSON files in data/ are not allowlisted (see .gitignore allowlist):";
          echo "$bad";
          exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
