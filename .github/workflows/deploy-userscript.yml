name: deploy-userscript

# Republishes the built .user.js to the gh-pages site whenever release-please cuts a tag.
# Tampermonkey clients pick up the new @version via their auto-update poll.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: npm ci

      - name: Build userscript with version-substituted header
        run: npm run build

      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.5.* pymdown-extensions

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Copy userscript alongside the docs site
        run: cp dist/pl-sync.user.js site/pl-sync.user.js

      - name: Verify version baked in
        run: |
          echo "Userscript header:"
          head -n 20 site/pl-sync.user.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
