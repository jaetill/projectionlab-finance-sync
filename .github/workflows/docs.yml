name: docs

# Rebuilds and deploys the full Pages artifact (MkDocs site + userscript) on doc-only changes.
# IMPORTANT: must always include pl-sync.user.js, otherwise a docs push would overwrite the Pages
# deployment and the userscript URL would 404 until the next release tag.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'userscript/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: npm ci

      - name: Install MkDocs Material
        run: pip install mkdocs-material==9.5.* pymdown-extensions

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Build userscript (version comes from .release-please-manifest.json)
        run: npm run build

      - name: Copy userscript alongside the docs site
        run: cp dist/pl-sync.user.js site/pl-sync.user.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
